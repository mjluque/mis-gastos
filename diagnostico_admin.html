
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .wrap{padding:1rem 0}
  .title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:12px}
  .sub{font-size:12px;color:var(--color-text-secondary);margin-bottom:16px}
  .btn{padding:7px 16px;font-size:13px;cursor:pointer;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-family:inherit}
  .btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
  .code{background:var(--color-background-secondary);border-radius:8px;padding:12px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);margin-top:10px;min-height:40px;max-height:320px;overflow-y:auto}
  .row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .check{padding:6px 12px;border-radius:6px;font-size:12px;display:flex;align-items:center;gap:6px}
  .ok{background:#e1f5ee;color:#0f6e56}
  .err{background:#faece7;color:#993c1d}
  .warn{background:#faeeda;color:#854f0b}
  .label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
  input{width:100%;font-size:13px;padding:6px 10px;border-radius:7px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-family:inherit}
</style>
<div class="wrap">
  <div class="title">Diagnóstico del panel admin</div>
  <div class="sub">Copiá la URL de tu servidor y pegala abajo. Luego ejecutá cada verificación.</div>

  <div style="margin-bottom:14px">
    <div class="label">URL del servidor (Railway)</div>
    <input type="text" id="srv-url" placeholder="https://mi-bot.railway.app">
  </div>

  <div class="row">
    <button class="btn btn-primary" onclick="runAll()">▶ Verificar todo</button>
    <button class="btn" onclick="checkHealth()">Health</button>
    <button class="btn" onclick="checkInfo()">Info</button>
    <button class="btn" onclick="checkAdminEndpoint()">Admin login</button>
  </div>

  <div id="checks" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px"></div>
  <div class="label">Resultado detallado</div>
  <div class="code" id="output">Esperando...</div>
</div>

<script>
function url(){return document.getElementById('srv-url').value.trim().replace(/\/$/,'')}
function log(msg){document.getElementById('output').textContent+=msg+'\n'}
function clear(){document.getElementById('output').textContent='';document.getElementById('checks').innerHTML=''}

function badge(id,status,text){
  const checks=document.getElementById('checks');
  let el=document.getElementById('chk-'+id);
  if(!el){el=document.createElement('div');el.id='chk-'+id;checks.appendChild(el);}
  const cls={ok:'ok',err:'err',warn:'warn'}[status]||'warn';
  const icon={ok:'✓',err:'✗',warn:'⚠'}[status]||'?';
  el.className='check '+cls;
  el.innerHTML=`<span>${icon}</span><span>${text}</span>`;
}

async function checkHealth(){
  const u=url();if(!u){badge('health','err','URL vacía');return;}
  try{
    badge('health','warn','Verificando /api/health...');
    const r=await fetch(u+'/api/health');
    const j=await r.json();
    log('Health: '+JSON.stringify(j,null,2));
    if(j.ok){
      badge('health','ok','Servidor OK · DB: '+j.db+(j.sheets?' · Sheets':''));
    }else{
      badge('health','err','Servidor respondió con error');
    }
  }catch(e){badge('health','err','No se pudo conectar: '+e.message);log('Error: '+e.message);}
}

async function checkInfo(){
  const u=url();if(!u){badge('info','err','URL vacía');return;}
  try{
    badge('info','warn','Verificando /api/info...');
    const r=await fetch(u+'/api/info');
    const j=await r.json();
    log('Info: '+JSON.stringify(j,null,2));
    badge('info','ok','Endpoint /api/info responde');
  }catch(e){badge('info','err','Falla /api/info: '+e.message);log('Error info: '+e.message);}
}

async function checkAdminEndpoint(){
  const u=url();if(!u){badge('admin','err','URL vacía');return;}
  try{
    badge('admin','warn','Verificando /api/admin/login...');
    // Solo verifica que el endpoint existe (no manda credenciales reales)
    const r=await fetch(u+'/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegramId:'test',password:'test'})});
    const j=await r.json();
    log('Admin login response (status '+r.status+'): '+JSON.stringify(j));
    if(r.status===401){
      badge('admin','ok','Endpoint /api/admin/login existe y rechaza credenciales incorrectas correctamente');
    }else if(r.status===503){
      badge('admin','err','Admin no configurado en el servidor (faltan ADMIN_TELEGRAM_ID o ADMIN_PASSWORD_HASH)');
    }else{
      badge('admin','warn','Respuesta inesperada: status '+r.status);
    }
  }catch(e){badge('admin','err','Falla /api/admin/login: '+e.message);log('Error: '+e.message);}
}

async function runAll(){
  clear();
  log('=== Diagnóstico completo ===\n');
  await checkHealth();
  await checkInfo();
  await checkAdminEndpoint();
  log('\n=== Fin del diagnóstico ===');
}
</script>
